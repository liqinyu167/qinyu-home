      color: var(--ink-muted);
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
    }

    .hot-strip {
      display: flex;
      gap: 10px;
      padding: 4px 0 18px;
      margin-bottom: 6px;
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(251, 191, 36, 0.48) transparent;
    }

    .hot-strip::-webkit-scrollbar {
      height: 8px;
    }

    .hot-strip::-webkit-scrollbar-track {
      background: transparent;
    }

    .hot-strip::-webkit-scrollbar-thumb {
      border: 2px solid transparent;
      background:
        linear-gradient(90deg, rgba(251, 191, 36, 0.68), rgba(251, 113, 133, 0.72), rgba(192, 132, 252, 0.72)) border-box;
      background-clip: padding-box;
    }

    .hot-chip {
      flex: 0 0 auto;
      min-height: 36px;
      padding: 8px 13px;
      border: 1px solid var(--border-ink);
      border-radius: 999px;
      background: rgba(15, 13, 26, 0.58);
      color: var(--ink-muted);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      transition: color 0.2s, border-color 0.2s, transform 0.2s var(--ease-spring);
    }

    .hot-chip:hover,
    .hot-chip.is-active {
      transform: translateY(-2px);
      border-color: rgba(251, 113, 133, 0.42);
      color: var(--ink-white);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .site-card {
      position: relative;
      min-height: 218px;
      padding: 19px;
      border: 0.5px solid var(--border-ink);
      border-radius: 8px 12px 7px 14px;
      background:
        linear-gradient(140deg, rgba(237, 232, 245, 0.035), transparent 36%),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='p'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.35' numOctaves='3'/%3E%3C/filter%3E%3Crect width='120' height='120' filter='url(%23p)' opacity='.22'/%3E%3C/svg%3E"),
        var(--bg-paper);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.22);
      clip-path: polygon(0 2%, 98% 0, 100% 93%, 96% 100%, 3% 98%, 0 88%);
      transform: rotate(var(--r, 0deg));
      transition: transform 0.25s var(--ease-spring), border-color 0.25s, box-shadow 0.25s;
      animation: cardIn 0.5s ease both;
      animation-delay: var(--d, 0.2s);
      cursor: pointer;
    }

    .site-card:nth-child(3n + 1) { --r: -0.28deg; }
    .site-card:nth-child(3n + 2) { --r: 0.22deg; }
    .site-card:nth-child(3n + 3) { --r: -0.08deg; }

    .site-card:hover,
    .site-card:focus-visible,
    .site-card.is-pulsing {
      transform: translateY(-3px) rotate(var(--r, 0deg));
      border-color: color-mix(in srgb, var(--cat-color, var(--ink-accent)), white 22%);
      box-shadow:
        0 22px 54px rgba(0, 0, 0, 0.38),
        0 0 0 2px color-mix(in srgb, var(--cat-color, var(--ink-accent)), transparent 12%),
        0 0 24px color-mix(in srgb, var(--cat-color, var(--ink-accent)), transparent 8%),
        0 0 64px color-mix(in srgb, var(--cat-color, var(--ink-accent)), transparent 16%),
        0 0 118px color-mix(in srgb, var(--cat-color, var(--ink-accent)), transparent 28%),
        0 0 150px rgba(251, 191, 36, 0.34);
    }

    .site-card:focus-visible {
      outline: 2px solid rgba(251, 191, 36, 0.78);
      outline-offset: 4px;
    }

    .site-card::before {
      position: absolute;
      top: 18px;
      left: 14px;
      width: 4px;
      height: 4px;
      border-radius: 99px;
      background: var(--cat-color, var(--ink-accent));
      box-shadow: 0 0 12px var(--cat-color, var(--ink-accent));
      content: "";
    }

    .site-card.is-pulsing::after {
      position: absolute;
      inset: -8px;
      border: 1px solid rgba(251, 191, 36, 0.72);
      border-radius: 14px;
      content: "";
      animation: discoverRing 1.1s ease-out both;
    }

    .site-card:hover::after,
    .site-card:focus-visible::after {
      position: absolute;
      inset: -12px;
      pointer-events: none;
      border: 1px solid color-mix(in srgb, var(--cat-color, var(--ink-accent)), white 26%);
      border-radius: 16px;
      content: "";
      filter: blur(4px);
      opacity: 0.95;
    }

    .card-head {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding-left: 11px;
      margin-bottom: 12px;
    }

    .site-favicon {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      flex-shrink: 0;
      object-fit: contain;
    }

    .site-name {
      margin: 0;
      color: var(--ink-white);
      font-size: 16px;
      font-weight: 500;
      line-height: 1.35;
      transition: color 0.25s;
    }

    .site-card:hover .site-name {
      color: var(--ink-accent);
    }

    .domain {
      margin-top: 3px;
      color: var(--ink-muted);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
    }

    .desc {
      display: -webkit-box;
      min-height: 42px;
      margin: 0 0 16px;
      overflow: hidden;
      color: var(--ink-muted);
      font-size: 13px;
      font-weight: 300;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-height: 30px;
      margin-bottom: 16px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 8px;
      border: 1px solid var(--tag-border, #33334433);
      border-radius: 999px;
      background: var(--tag-bg, #1f1f2e);
      color: var(--tag-text, var(--ink-muted));
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      line-height: 1;
    }

    .card-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .card-action {
      display: inline-grid;
      place-items: center;
      min-width: 40px;
      height: 40px;
      padding: 0 13px;
      border: 1px solid var(--border-ink);
      border-radius: 8px;
      background: rgba(8, 7, 16, 0.34);
      color: var(--ink-muted);
      font-family: "JetBrains Mono", monospace;
      transition: color 0.2s, border-color 0.2s, transform 0.2s var(--ease-spring);
    }

    .card-action:hover,
    .card-action.is-saved {
      transform: translateY(-2px);
      border-color: rgba(251, 191, 36, 0.5);
      color: var(--ink-gold);
    }

    .site-link {
      min-width: 76px;
    }

    .favorite-toggle {
      width: 40px;
      padding: 0;
    }

    .site-dialog {
      width: min(96vw, 1120px);
      padding: 0;
      border: 1px solid rgba(192, 132, 252, 0.28);
      border-radius: 14px;
      background:
        linear-gradient(140deg, rgba(237, 232, 245, 0.06), transparent 38%),
        var(--bg-paper);
      color: var(--ink-white);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.42), 0 0 54px rgba(192, 132, 252, 0.18);
      overflow: visible;
    }

    .site-dialog::backdrop {
      background: rgba(8, 7, 16, 0.68);
      backdrop-filter: blur(10px);
    }

    .game-dialog {
      width: min(94vw, 980px);
      padding: 0;
      border: 1px solid rgba(251, 191, 36, 0.26);
      border-radius: 14px;
      background:
        linear-gradient(140deg, rgba(251, 191, 36, 0.08), transparent 38%),
        var(--bg-paper);
      color: var(--ink-white);
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.44), 0 0 54px rgba(251, 191, 36, 0.13);
      overflow: hidden;
    }

    .game-dialog::backdrop {
      background: rgba(8, 7, 16, 0.72);
      backdrop-filter: blur(10px);
    }

    .game-window {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: min(72vh, 620px);
    }

    .game-window-bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 40px;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border-ink);
      background: rgba(8, 7, 16, 0.28);
    }

    .game-window-title {
      margin: 0;
      font-family: "JetBrains Mono", monospace;
      font-size: 13px;
    }

    .game-close {
      display: inline-grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 1px solid var(--border-ink);
      border-radius: 8px;
      background: rgba(8, 7, 16, 0.34);
      color: var(--ink-muted);
    }

    .game-close:hover {
      border-color: rgba(251, 113, 133, 0.5);
      color: var(--ink-coral);
    }

    .game-frame {
      width: 100%;
      height: min(64vh, 560px);
      border: 0;
      background: #f7f7f7;
    }

    .site-detail {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 0.72fr) 0;
      gap: 18px;
      padding: 22px;
      transition: grid-template-columns 0.28s ease;
    }

    .site-detail.has-relation-panel {
      grid-template-columns: minmax(0, 1fr) minmax(260px, 0.72fr) minmax(260px, 0.62fr);
    }

    .detail-main {
      min-width: 0;
    }

    .detail-top {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) 40px;
      gap: 12px;
      align-items: start;
    }

    .detail-favicon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      object-fit: contain;
      background: rgba(251, 247, 255, 0.04);
    }

    .detail-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.22;
    }

    .detail-domain {
      margin-top: 4px;
      color: var(--ink-muted);
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .detail-close {
      display: inline-grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border: 1px solid var(--border-ink);
      border-radius: 8px;
      background: rgba(8, 7, 16, 0.34);
      color: var(--ink-muted);
    }

    .detail-close:hover {
      border-color: rgba(251, 113, 133, 0.5);
      color: var(--ink-coral);
    }

    .detail-desc {
      margin: 20px 0 18px;
      color: var(--ink-muted);
      font-size: 14px;
    }

    .detail-meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .detail-meta-item {
      padding: 10px 12px;
      border: 1px solid var(--border-ink);
      border-radius: 8px;
      background: rgba(8, 7, 16, 0.22);
    }

    .detail-meta-label {
      display: block;
      color: var(--ink-muted);
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
    }

    .detail-meta-value {
      display: block;
      margin-top: 3px;
      font-size: 13px;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .detail-map {
      position: relative;
      min-width: 0;
      padding: 16px;
      border: 1px solid var(--border-ink);
      border-radius: 10px;
      background:
        radial-gradient(circle at 50% 30%, rgba(192, 132, 252, 0.16), transparent 56%),
        rgba(8, 7, 16, 0.22);
      overflow: hidden;
    }

    .detail-map::before {
      position: absolute;
      inset: 18px;
      pointer-events: none;
      border: 1px dashed rgba(192, 132, 252, 0.18);
      border-radius: 999px;
      content: "";
    }

    .map-title {
      position: relative;
      z-index: 1;
      margin: 0 0 14px;
      color: var(--ink-muted);
      font-family: "JetBrains Mono", monospace;
      font-size: 11px;
      text-transform: uppercase;
    }

    .map-center {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 11px;
      border: 1px solid color-mix(in srgb, var(--cat-color, var(--ink-accent)), transparent 32%);
      border-radius: 10px;
      background: rgba(25, 22, 37, 0.74);
      box-shadow: 0 0 26px color-mix(in srgb, var(--cat-color, var(--ink-accent)), transparent 72%);
    }

    .map-center img,
    .map-node img {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      object-fit: contain;
      background: rgba(251, 247, 255, 0.04);
    }

    .map-center-name,
    .map-node-name {
      display: block;
      min-width: 0;
      overflow: hidden;
      color: var(--ink-white);
      font-size: 13px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .map-center-role,
    .map-node-role {
      display: block;
      margin-top: 2px;
      color: var(--ink-muted);
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
    }

    .map-groups {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .map-actions {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    .map-action {
      min-width: 0;
      min-height: 40px;
      padding: 8px 11px;
      border: 1px solid rgba(192, 132, 252, 0.16);
      border-radius: 8px;
      background: rgba(15, 13, 26, 0.46);
      color: var(--ink-white);
      text-align: left;
      transition: background 0.22s, color 0.22s, box-shadow 0.22s;
    }

    .map-action:hover,
    .map-action.is-active {
      background: rgba(192, 132, 252, 0.14);
      color: var(--ink-white);
      box-shadow: inset 0 0 0 1px rgba(251, 191, 36, 0.18), 0 0 24px rgba(192, 132, 252, 0.14);
    }

    .map-action-label {
      display: block;
      font-size: 12px;
    }

    .map-action-count {
      display: block;
      margin-top: 2px;
      margin-left: 0;
      color: var(--ink-muted);
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
    }

    .relation-panel {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr;
      min-width: 0;
      max-height: min(72vh, 580px);
      padding: 15px;
      border: 1px solid rgba(192, 132, 252, 0.22);
      border-radius: 12px;
      background:
        radial-gradient(circle at 12% 8%, rgba(251, 191, 36, 0.08), transparent 44%),
        linear-gradient(180deg, rgba(25, 22, 37, 0.9), rgba(15, 13, 26, 0.84)),
        rgba(8, 7, 16, 0.22);
      box-shadow: inset 0 0 0 1px rgba(251, 247, 255, 0.035), 0 0 40px rgba(192, 132, 252, 0.12);
      opacity: 0;
      visibility: hidden;
      overflow: hidden;
      pointer-events: none;
      transform: translateX(-8px);
      transition: opacity 0.22s ease, transform 0.28s ease, visibility 0.22s;
    }

    .relation-panel::before {
      position: absolute;
      top: 18px;
      bottom: 18px;
      left: -10px;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(251, 191, 36, 0.38), rgba(192, 132, 252, 0.28), transparent);
      content: "";
    }

    .site-detail.has-relation-panel .relation-panel {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateX(0);
    }

    .relation-panel-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 34px;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .relation-panel-title {
      margin: 0;
      color: var(--ink-white);
      font-size: 14px;
      line-height: 1.2;
    }

    .relation-panel-close {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 1px solid var(--border-ink);
      border-radius: 8px;
      background: rgba(8, 7, 16, 0.34);
      color: var(--ink-muted);
    }

    .relation-panel-list {
      display: grid;
      align-content: start;
      gap: 9px;
      min-height: 0;
      overflow-y: auto;
      scrollbar-width: thin;
    }

    .map-group {
      display: grid;
      gap: 7px;
    }

    .map-group-label {
      color: var(--ink-muted);
      font-family: "JetBrains Mono", monospace;
      font-size: 10px;
      text-transform: uppercase;
    }

    .map-node {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      gap: 9px;
      align-items: center;
      min-height: 48px;
      padding: 8px 10px;
      border: 1px solid rgba(192, 132, 252, 0.16);
      border-radius: 9px;
      background:
        linear-gradient(135deg, rgba(237, 232, 245, 0.045), transparent 45%),
        rgba(15, 13, 26, 0.58);
      color: inherit;
      text-align: left;
      transition: transform 0.22s var(--ease-spring), border-color 0.22s, box-shadow 0.22s;
    }

    .map-node:hover {
      transform: translateY(-2px);
      border-color: rgba(251, 191, 36, 0.48);
      box-shadow: 0 0 28px rgba(192, 132, 252, 0.18);
    }

    .map-node-arrow {
      color: var(--ink-gold);
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
    }

    .map-empty {
      position: relative;
      z-index: 1;
      margin: 14px 0 0;
      color: var(--ink-muted);
      font-size: 12px;
    }

    .detail-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .detail-link,
    .detail-favorite {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 44px;
      border: 1px solid var(--border-ink);
      border-radius: 8px;
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
    }

    .detail-link {
      flex: 1;
      background: rgba(192, 132, 252, 0.14);
      color: var(--ink-white);
    }

    .detail-favorite {
      width: 52px;
      background: rgba(8, 7, 16, 0.34);
      color: var(--ink-muted);
    }

    .detail-favorite.is-saved {
      border-color: rgba(251, 191, 36, 0.5);
      color: var(--ink-gold);
    }

    .empty-state {
      display: grid;
      place-items: center;
      min-height: calc(100dvh - var(--topbar-h) - 190px);
      padding: 42px 18px;
      text-align: center;
    }

    .empty-ink {
      width: 80px;
      height: 80px;
      color: var(--ink-accent);
      filter: drop-shadow(0 0 24px rgba(192, 132, 252, 0.32));
      animation: breathe 3s ease-in-out infinite;
    }

    .empty-title {
      margin: 14px 0 3px;
      font-family: "ZCOOL XiaoWei", serif;
      font-size: 24px;
      line-height: 1.2;
    }

    .empty-subtitle {
      margin: 0;
      color: var(--ink-muted);
      font-family: "JetBrains Mono", monospace;
      font-size: 12px;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      z-index: 25;
      display: none;
      background: rgba(8, 7, 16, 0.58);
      backdrop-filter: blur(8px);
    }

    .backdrop.is-open {
      display: block;
    }

    @keyframes topbarIn {
      from { opacity: 0; transform: translateY(-60px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes sidebarIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) rotate(var(--r, 0deg)); }
      to { opacity: 1; transform: rotate(var(--r, 0deg)); }
    }

    @keyframes subcatIn {
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    @keyframes focusPulse {
      0% { box-shadow: 0 0 0 0 rgba(192, 132, 252, 0.24), inset 0 0 24px rgba(192, 132, 252, 0.08); }
      100% { box-shadow: 0 0 0 10px rgba(192, 132, 252, 0), inset 0 0 24px rgba(192, 132, 252, 0.08); }
    }

    @keyframes discoverRing {
      from { opacity: 1; transform: scale(0.97); }
      to { opacity: 0; transform: scale(1.08); }
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        align-content: center;
      }

      .hero-copy {
        max-width: 820px;
      }

      .hero-visual {
        min-height: 390px;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 767px) {
      :root {
        --topbar-h: 132px;
      }

      .topbar {
        grid-template-columns: 1fr auto auto;
        gap: 10px;
        padding: 10px 14px 12px;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 22px;
        align-content: center;
        padding: 30px 18px 24px;
      }

      .hero::before {
        inset: 12px;
      }

      .hero-title {
        max-width: 8.6em;
        font-size: clamp(44px, 13vw, 64px);
      }

      .hero-subtitle {
        font-size: 13px;
      }

      .hero-scroll {
        margin-top: 26px;
      }

      .hero-visual {
        min-height: 330px;
      }

      .toolbox-section {
        display: block;
      }

      .hamburger {
        display: inline-grid;
        place-items: center;
      }

      .brand {
        grid-template-columns: 44px minmax(0, 1fr);
      }

      .brand-title {
        font-size: 17px;
      }

      .brand-subtitle {
        font-size: 9px;
        letter-spacing: 0.16em;
      }

      .search-wrap {
        grid-column: 1 / -1;
        grid-row: 2;
      }

      .search {
        width: 100%;
      }

      .actions {
        gap: 8px;
      }

      .random-button span:last-child,
      .theme-label {
        display: none;
      }

      .sidebar {
        position: fixed;
        top: var(--topbar-h);
        z-index: 35;
        width: min(86vw, 300px);
        height: calc(100dvh - var(--topbar-h));
        transform: translateX(-110%);
        transition: transform 0.28s ease;
        animation: none;
      }

      .sidebar.is-open {
        transform: translateX(0);
      }

      .main {
        padding: calc(var(--topbar-h) + 16px) 15px 36px;
      }

      .filter-bar {
        align-items: flex-start;
        flex-direction: column;
        gap: 6px;
      }

      .site-detail {
        grid-template-columns: 1fr;
        padding: 18px;
      }

      .detail-meta {
        grid-template-columns: 1fr;
      }

      .detail-map {
        padding: 14px;
      }

      .site-detail,
      .site-detail.has-relation-panel {
        grid-template-columns: 1fr;
      }

      .relation-panel {
        max-height: min(56vh, 420px);
      }

      .game-window {
        min-height: min(70vh, 560px);
      }

      .game-frame {
        height: min(60vh, 500px);
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <script>
    if (window.location.hash === "#toolbox") {
      document.body.classList.add("toolbox-open");
    }
  </script>
  <canvas id="inkCanvas" aria-hidden="true"></canvas>

  <section class="hero" aria-labelledby="heroTitle">

  <header class="topbar">

    <div class="search-wrap">
      <label class="search" for="searchInput">

        <span class="sr-only">搜索</span>
        <input id="searchInput" type="search" autocomplete="off" placeholder="搜索工具、风格、灵感来源...">
        <button class="clear-search" id="clearSearch" type="button" aria-label="清空搜索">×</button>
      </label>

    <div class="actions" aria-label="页面操作">
      <button class="icon-button" id="themeToggle" type="button" aria-label="切换深色浅色模式">

      </button>

  </header>

  <div class="backdrop" id="backdrop" aria-hidden="true"></div>

  <aside class="sidebar" id="sidebar" aria-label="分类导航">
    <div class="sidebar-inner">
      <div class="side-mark">
        <span class="side-kanji">好奇心</span>
        <span class="side-meta">INDEX / PANEL / VOID</span>
      </div>

      <p class="section-title">三大品类</p>
      <nav id="categoryTree"></nav>

      <div class="utility-links">
        <p class="section-title">个人入口</p>
        <button class="side-link" id="sideFavorites" type="button">
          <span aria-hidden="true">◉</span><span>收藏夹</span>
        </button>
<button class="side-link" id="dinoGameButton" type="button">
          <span aria-hidden="true">◇</span><span>恐龙游戏</span>
        </button>
        <a class="side-link" href="https://grok.curiosity.best/webui/chat" target="_blank" rel="noopener">
          <span aria-hidden="true">◆</span><span>Grok 聊天</span>
        </a>
        <a class="side-link" href="mailto:submit@example.com">
          <span aria-hidden="true">◆</span><span>投稿入口</span>
        </a>
      </div>
    </div>
  </aside>

  <main class="main" id="main">
    <section class="filter-bar" aria-label="当前筛选">
      <div class="breadcrumb">BAIDAO AIGC TOOLBOX / <span class="active-filter" id="activeFilter">全部</span></div>
      <div class="result-count" id="resultCount">0 SITES</div>
    </section>

    <section class="hot-strip" id="hotStrip" aria-label="热门标签"></section>

    <section class="grid" id="siteGrid" aria-live="polite"></section>

  </section>

  <dialog class="site-dialog" id="siteDialog" aria-labelledby="siteDialogTitle">
    <div class="site-detail" id="siteDetail"></div>
  </dialog>

  <dialog class="game-dialog" id="gameDialog" aria-labelledby="gameDialogTitle">
    <div class="game-window">
      <div class="game-window-bar">
        <h2 class="game-window-title" id="gameDialogTitle">恐龙游戏</h2>
        <button class="game-close" id="gameClose" type="button" aria-label="关闭恐龙游戏">×</button>
      </div>
      <iframe class="game-frame" id="gameFrame" title="恐龙游戏" data-src="games/dino.html"></iframe>
    </div>
  </dialog>

  <script>
    const MOCK_DATA = {
      categories: [
        { id: "tools", label: "工具", en: "TOOLS", children: [] },
        { id: "aesthetics", label: "审美", en: "AESTHETICS", children: [] },
        { id: "inspiration", label: "灵感", en: "INSPIRATION", children: [] }
      ]
    };

    const FALLBACK_SITES = [];

    const state = {
      categories: MOCK_DATA.categories,
      sites: [],
      search: "",
      activeCategory: "all",
      activeSubcategory: "",
      favoritesOnly: false,
      expanded: new Set(["tools", "aesthetics", "inspiration"]),
      favorites: new Set(JSON.parse(localStorage.getItem("manga_nav_favorites") || "[]"))
    };

    const els = {
      body: document.body,
      tree: document.getElementById("categoryTree"),
      grid: document.getElementById("siteGrid"),
      hotStrip: document.getElementById("hotStrip"),
      search: document.getElementById("searchInput"),
      clear: document.getElementById("clearSearch"),
      activeFilter: document.getElementById("activeFilter"),
      resultCount: document.getElementById("resultCount"),
      favoriteCount: document.getElementById("favoriteCount"),
      favoritesButton: document.getElementById("favoritesButton"),
      sideFavorites: document.getElementById("sideFavorites"),
      randomButton: document.getElementById("randomButton"),
      themeToggle: document.getElementById("themeToggle"),
      menuButton: document.getElementById("menuButton"),
      sidebar: document.getElementById("sidebar"),
      backdrop: document.getElementById("backdrop"),
      siteDialog: document.getElementById("siteDialog"),
      siteDetail: document.getElementById("siteDetail"),
      dinoGameButton: document.getElementById("dinoGameButton"),
      gameDialog: document.getElementById("gameDialog"),
      gameClose: document.getElementById("gameClose"),
      gameFrame: document.getElementById("gameFrame")
    };

    const categoryColors = {
      tools: "var(--tools)",
      aesthetics: "var(--aesthetics)",
      inspiration: "var(--inspiration)"
    };

    const tagStyles = {
      "免费": ["#14532d22", "#4ade80", "#4ade8033"],
      "订阅制": ["#78350f22", "#fbbf24", "#fbbf2433"],
      "开源": ["#3b076422", "#c084fc", "#c084fc33"],
      "中文": ["#1e3a5f22", "#60a5fa", "#60a5fa33"],
      "API": ["#7f1d1d22", "#f87171", "#f8717133"],
      "移动端": ["#16435122", "#34d399", "#34d39933"],
      "本地部署": ["#29292922", "#a1a1aa", "#a1a1aa33"]
    };

    function saveFavorites() {
      localStorage.setItem("manga_nav_favorites", JSON.stringify([...state.favorites]));
      els.favoriteCount.textContent = state.favorites.size;
    }

    function domainFromUrl(url) {
      try {
        return new URL(url).hostname.replace(/^www\./, "");
      } catch {
        return url.replace(/^https?:\/\//, "").split("/")[0];
      }
    }

    function faviconPath(site) {
      return `assets/favicons/${site.url.replace(/^https?:\/\//, "").split("/")[0].replace(/\./g, "_")}.png`;
    }

    function getCategoryLabel(id) {
      const category = state.categories.find((item) => item.id === id);
      return category ? `${category.label} ${category.en}` : "全部";
    }

    function getSiteCategory(site) {
      return site.category || (site.primarySection ? "tools" : "");
    }

    function getSiteSections(site) {
      return site.sections || (site.subcategory ? [site.subcategory] : []);
    }

    function getSubcategoryLabel(categoryId, subcategoryId) {
      const category = state.categories.find((item) => item.id === categoryId);
      return category?.children?.find((child) => child.id === subcategoryId)?.label || "未分类";
    }

    function getPrimarySectionLabel(site) {
      const categoryId = getSiteCategory(site);
      const sectionId = site.primarySection || site.subcategory;
      return getSubcategoryLabel(categoryId, sectionId);
    }

    function getSiteById(id) {
      return state.sites.find((site) => site.id === id);
    }

    function renderTag(tag) {
      const style = tagStyles[tag] || ["#1f1f2e", "#7a718f", "#33334433"];
      return `<span class="tag" style="--tag-bg:${style[0]};--tag-text:${style[1]};--tag-border:${style[2]}">${tag}</span>`;
    }

    const relationLabels = {
      upstream: "上游",
      downstream: "下游",
      alternatives: "替代"
    };

    function relatedSitesFor(site, key) {
      return (site.relations?.[key] || []).map(getSiteById).filter(Boolean);
    }

    function renderMapNode(relatedSite) {
      return `
        <button class="map-node" type="button" data-id="${relatedSite.id}" aria-label="查看 ${relatedSite.name}">
          <img src="${faviconPath(relatedSite)}" alt="" onerror="this.style.visibility='hidden'">
          <span>
            <span class="map-node-name">${relatedSite.name}</span>
            <span class="map-node-role">${getPrimarySectionLabel(relatedSite)}</span>
          </span>
          <span class="map-node-arrow" aria-hidden="true">↗</span>
        </button>
      `;
    }

    function renderRelationMap(site) {
      const actions = Object.entries(relationLabels).map(([key, label]) => {
        const count = relatedSitesFor(site, key).length;
        return `
          <button class="map-action" type="button" data-relation="${key}">
            <span class="map-action-label">${label}</span>
            <span class="map-action-count">${count} ITEMS</span>
          </button>
        `;
      }).join("");

      return `
        <aside class="detail-map" data-site-id="${site.id}" aria-label="子类拓展图">
          <p class="map-title">Expansion Map</p>
          <div class="map-center">
            <img src="${faviconPath(site)}" alt="" onerror="this.style.visibility='hidden'">
            <span>
              <span class="map-center-name">${site.name}</span>
              <span class="map-center-role">${getPrimarySectionLabel(site)}</span>
            </span>
          </div>
          <div class="map-actions">${actions}</div>
        </aside>
      `;
    }

    function openSiteDetail(site) {
      if (!site) return;
      const tags = (site.tags || []).map(renderTag).join("");
      els.siteDetail.innerHTML = `
        <div class="detail-main">
          <div class="detail-top">
            <img class="detail-favicon" src="${faviconPath(site)}" alt="" onerror="this.style.visibility='hidden'">
            <div>
              <h2 class="detail-title" id="siteDialogTitle">${site.name}</h2>
              <div class="detail-domain">${domainFromUrl(site.url)}</div>
            </div>
            <button class="detail-close" type="button" aria-label="关闭详情">×</button>
          </div>
          <p class="detail-desc">${site.description || "暂无描述，等待维护者补完这一格分镜。"}</p>
          <div class="detail-meta" aria-label="站点信息">
            <span class="detail-meta-item">
              <span class="detail-meta-label">Category</span>
              <span class="detail-meta-value">${getCategoryLabel(getSiteCategory(site))}</span>
            </span>
            <span class="detail-meta-item">
              <span class="detail-meta-label">Scene</span>
              <span class="detail-meta-value">${getPrimarySectionLabel(site)}</span>
            </span>
          </div>
          <div class="detail-tags">${tags}</div>
          <div class="detail-actions">
            <a class="detail-link" href="${site.url}" target="_blank" rel="noreferrer">打开网站 ↗</a>
            <button class="detail-favorite ${state.favorites.has(site.id) ? "is-saved" : ""}" type="button" aria-label="收藏 ${site.name}" data-id="${site.id}">★</button>
          </div>
        </div>
        ${renderRelationMap(site)}
        <aside class="relation-panel" aria-live="polite">
          <div class="relation-panel-head">
            <h3 class="relation-panel-title">关系</h3>
            <button class="relation-panel-close" type="button" aria-label="关闭关系内容">×</button>
          </div>
          <div class="relation-panel-list"></div>
        </aside>
      `;
      els.siteDialog.showModal();
      els.siteDetail.querySelector(".detail-close").focus();
    }

    function closeSiteDetail() {
      if (els.siteDialog.open) els.siteDialog.close();
    }

    function openGameWindow() {
      els.gameFrame.src = els.gameFrame.dataset.src;
      els.gameDialog.showModal();
      closeMobileSidebar();
    }

    function closeGameWindow() {
      if (els.gameDialog.open) els.gameDialog.close();
    }

    function openRelationDrawer(button) {
      const detail = button.closest(".site-detail");
      const map = detail.querySelector(".detail-map");
      const relation = button.dataset.relation;
      const site = getSiteById(map.dataset.siteId);
      if (!detail || !map || !relation || !site) return;
      const title = detail.querySelector(".relation-panel-title");
      const list = detail.querySelector(".relation-panel-list");
      const relatedSites = relatedSitesFor(site, relation);
      map.querySelectorAll(".map-action").forEach((item) => {
        item.classList.toggle("is-active", item === button);
      });
      title.textContent = relationLabels[relation];
      list.innerHTML = relatedSites.length
        ? relatedSites.map(renderMapNode).join("")
        : `<p class="map-empty">这里还没有维护内容。</p>`;
      detail.classList.add("has-relation-panel");
    }

    function closeRelationDrawer(target) {
      const detail = target.closest(".site-detail");
      if (!detail) return;
      const map = detail.querySelector(".detail-map");
      detail.classList.remove("has-relation-panel");
      map.querySelectorAll(".map-action").forEach((item) => item.classList.remove("is-active"));
    }

    function getFilteredSites() {
      const query = state.search.trim().toLowerCase();
      return state.sites.filter((site) => {
        const siteCategory = getSiteCategory(site);
        const siteSections = getSiteSections(site);
        const matchesCategory = state.activeCategory === "all" || siteCategory === state.activeCategory;
        const matchesSubcategory = !state.activeSubcategory || siteSections.includes(state.activeSubcategory);
        const haystack = [
          site.name,
          site.description,
          site.url,
          site.type,
          site.primarySection,
          ...(site.sections || []),
          ...(site.capabilities || []),
          ...(site.tags || [])
        ].join(" ").toLowerCase();
        const matchesSearch = !query || haystack.includes(query);
        const matchesFavorite = !state.favoritesOnly || state.favorites.has(site.id);
        return matchesCategory && matchesSubcategory && matchesSearch && matchesFavorite;
      });
    }

    function renderTree() {
      els.tree.innerHTML = "";
      state.categories.forEach((category) => {
        const root = document.createElement("div");
        root.className = "category-root";
        root.style.setProperty("--cat-color", categoryColors[category.id] || "var(--ink-accent)");

        const button = document.createElement("button");
        button.type = "button";
        button.className = "category-button";
        button.setAttribute("aria-expanded", String(state.expanded.has(category.id)));
        button.innerHTML = `<span aria-hidden="true">◈</span><span>${category.label}<span class="en">${category.en}</span></span><span class="twist" aria-hidden="true">▸</span>`;
        button.classList.toggle("is-active", state.activeCategory === category.id && !state.activeSubcategory && !state.favoritesOnly);
        button.addEventListener("click", () => {
          if (state.expanded.has(category.id)) state.expanded.delete(category.id);
          else state.expanded.add(category.id);
          state.activeCategory = category.id;
          state.activeSubcategory = "";
          state.favoritesOnly = false;
          render();
          closeMobileSidebar();
        });
        root.appendChild(button);

        const list = document.createElement("div");
        list.className = `subcat-list ${state.expanded.has(category.id) ? "is-open" : ""}`;
        const children = category.children && category.children.length ? category.children : [
          { id: `${category.id}-loading`, label: "等待 API 子分类" }
        ];
        children.forEach((child, index) => {
          const childButton = document.createElement("button");
          childButton.type = "button";
          childButton.className = "subcat-button";
          childButton.style.animationDelay = `${index * 30}ms`;
          childButton.innerHTML = `<span aria-hidden="true">◆</span><span>${child.label}</span>`;
          childButton.classList.toggle("is-active", state.activeSubcategory === child.id);
          childButton.disabled = child.id.endsWith("-loading");
          childButton.addEventListener("click", () => {
            state.activeCategory = category.id;
            state.activeSubcategory = child.id;
            state.favoritesOnly = false;
            render();
            closeMobileSidebar();
          });
          list.appendChild(childButton);
        });
        root.appendChild(list);
        els.tree.appendChild(root);
      });
    }

    function renderHotStrip() {
      const tags = [...new Set(state.sites.flatMap((site) => site.tags || []))].slice(0, 12);
      const fallbackTags = ["免费", "中文", "开源", "API", "移动端", "本地部署"];
      els.hotStrip.innerHTML = "";
      (tags.length ? tags : fallbackTags).forEach((tag) => {
        const chip = document.createElement("button");
        chip.type = "button";
        chip.className = "hot-chip";
        chip.textContent = `# ${tag}`;
        chip.addEventListener("click", () => {
          els.search.value = tag;
          state.search = tag;
          state.favoritesOnly = false;
          render();
        });
        els.hotStrip.appendChild(chip);
      });
    }

    function renderCards(sites) {
      els.grid.innerHTML = "";
      if (!sites.length) {
        els.grid.style.display = "block";
        els.grid.innerHTML = `
          <div class="empty-state">
            <div>
              <svg class="empty-ink" viewBox="0 0 96 96" role="img" aria-label="浮动墨滴">
                <path fill="currentColor" d="M50.7 6.4c8.8 13.6 22.8 28.3 22.8 48.3 0 20.4-12.4 33.4-29.5 33.4-16.5 0-28.7-10.8-28.7-27.4 0-13.2 9-24.6 17.8-35.5 4.9-6.1 9.7-12.1 12.7-18.5 1-2.1 3.6-2.2 4.9-.3Z"/>
                <path fill="rgba(237,232,245,.78)" d="M33.2 54.5c-1.9 0-3.3-1.6-3-3.5 1.1-7.6 7.1-15.5 12.1-21.9 1.1-1.4 3.3-.4 3 1.4-1.7 10.1-5.5 24-12.1 24Z"/>
              </svg>
              <h1 class="empty-title">宇宙正在展开</h1>
              <p class="empty-subtitle">内容由 AI Agent 持续维护更新中</p>
            </div>
          </div>`;
        return;
      }

      els.grid.style.display = "";
      sites.forEach((site, index) => {
        const card = document.createElement("article");
        card.className = "site-card";
        card.id = `site-${site.id}`;
        card.tabIndex = 0;
        card.setAttribute("role", "button");
        card.setAttribute("aria-label", `查看 ${site.name} 详情`);
        card.dataset.id = site.id;
        card.style.setProperty("--cat-color", categoryColors[getSiteCategory(site)] || "var(--ink-accent)");
        card.style.setProperty("--d", `${0.2 + index * 0.05}s`);

        const tags = (site.tags || []).map(renderTag).join("");

        card.innerHTML = `
          <div class="card-head">
            <img class="site-favicon" src="${faviconPath(site)}" alt="" loading="lazy" onerror="this.style.display='none'">
            <div>
              <h2 class="site-name">${site.name}</h2>
              <div class="domain">${domainFromUrl(site.url)}</div>
            </div>
          </div>
          <p class="desc">${site.description || "暂无描述，等待维护者补完这一格分镜。"}</p>
          <div class="tags">${tags}</div>
          <div class="card-actions">
            <a class="card-action site-link" href="${site.url}" target="_blank" rel="noreferrer" aria-label="打开 ${site.name}">↗</a>
            <button class="card-action favorite-toggle ${state.favorites.has(site.id) ? "is-saved" : ""}" type="button" aria-label="收藏 ${site.name}" data-id="${site.id}">★</button>
          </div>
        `;
        els.grid.appendChild(card);
      });
    }

    function render() {
      const sites = getFilteredSites();
      renderTree();
      renderHotStrip();
      renderCards(sites);

      const label = state.favoritesOnly ? "收藏夹" : (state.activeCategory === "all" ? "全部" : getCategoryLabel(state.activeCategory));
      els.activeFilter.textContent = state.search ? `${label} / ${state.search}` : label;
      els.resultCount.textContent = `${sites.length} SITES`;
      els.clear.classList.toggle("is-visible", Boolean(state.search));
      els.favoritesButton.classList.toggle("is-active", state.favoritesOnly);
      els.sideFavorites.classList.toggle("is-active", state.favoritesOnly);
      saveFavorites();
    }

    function closeMobileSidebar() {
      els.sidebar.classList.remove("is-open");
      els.backdrop.classList.remove("is-open");
      els.menuButton.setAttribute("aria-expanded", "false");
    }

    function toggleFavorite(id) {
      if (state.favorites.has(id)) state.favorites.delete(id);
      else state.favorites.add(id);
      render();
    }

    async function loadData() {
      try {
        const response = await fetch("data/sites.json", { cache: "no-store" });
        if (!response.ok) throw new Error("sites.json not found");
        const data = await response.json();
        state.categories = data.categories && data.categories.length ? data.categories : MOCK_DATA.categories;
        state.sites = Array.isArray(data.sites) ? data.sites : FALLBACK_SITES;
      } catch {
        state.categories = MOCK_DATA.categories;
        state.sites = FALLBACK_SITES;
      }
      render();
    }

    function bindEvents() {
      const hero = document.querySelector(".hero");
      const enterCover = document.querySelector(".hero-scroll");
      const topbar = document.querySelector(".topbar");
      let touchStartY = 0;

      function dismissHero({ instant = false } = {}) {
        if (!hero) return;
        document.body.classList.add("toolbox-open");
        hero.setAttribute("aria-hidden", "true");
        hero.inert = true;
        if (instant) {
          hero.hidden = true;
        } else {
          window.setTimeout(() => {
            if (document.body.classList.contains("toolbox-open")) hero.hidden = true;
          }, 560);
        }
        window.scrollTo(0, 0);
      }

      function restoreHero() {
        if (!hero) return;
        hero.hidden = false;
        hero.removeAttribute("aria-hidden");
        hero.inert = false;
        if (window.location.hash === "#toolbox") {
          history.replaceState(null, "", `${window.location.pathname}${window.location.search}`);
        }
        window.requestAnimationFrame(() => {
          document.body.classList.remove("toolbox-open");
          window.scrollTo(0, 0);
        });
      }

      if (window.location.hash === "#toolbox") {
        dismissHero({ instant: true });
      }

      window.addEventListener("wheel", (event) => {
        if (!hero || document.body.classList.contains("toolbox-open") || event.deltaY <= 0) return;
        event.preventDefault();
        dismissHero();
      }, { passive: false });

      window.addEventListener("touchstart", (event) => {
        touchStartY = event.touches[0] ? event.touches[0].clientY : 0;
      }, { passive: true });

      window.addEventListener("touchmove", (event) => {
        if (!hero || document.body.classList.contains("toolbox-open")) return;
        const currentY = event.touches[0] ? event.touches[0].clientY : touchStartY;
        if (touchStartY - currentY > 26) {
          event.preventDefault();
          dismissHero();
        }
      }, { passive: false });

      window.addEventListener("keydown", (event) => {
        const enterKeys = ["ArrowDown", "PageDown", " "];
        const backKeys = ["ArrowUp", "PageUp"];
        if (!document.body.classList.contains("toolbox-open") && enterKeys.includes(event.key)) {
          event.preventDefault();
          dismissHero();
          return;
        }
        if (document.body.classList.contains("toolbox-open") && backKeys.includes(event.key)) {
          event.preventDefault();
          restoreHero();
        }
      });

      if (enterCover) {
        enterCover.addEventListener("click", (event) => {
          event.preventDefault();
          dismissHero();
        });
      }

      if (topbar) {
        topbar.addEventListener("wheel", (event) => {
          if (!hero || !document.body.classList.contains("toolbox-open") || event.deltaY >= 0) return;
          event.preventDefault();
          restoreHero();
        }, { passive: false });
      }

      els.search.addEventListener("input", (event) => {
        state.search = event.target.value;
        render();
      });

      els.clear.addEventListener("click", () => {
        els.search.value = "";
        state.search = "";
        els.search.focus();
        render();
      });

      els.grid.addEventListener("click", (event) => {
        const favoriteButton = event.target.closest(".favorite-toggle");
        if (favoriteButton) {
          toggleFavorite(favoriteButton.dataset.id);
          return;
        }
        if (event.target.closest("a, button")) return;
        const card = event.target.closest(".site-card");
        if (card) openSiteDetail(getSiteById(card.dataset.id));
      });

      els.grid.addEventListener("keydown", (event) => {
        if (!["Enter", " "].includes(event.key)) return;
        if (event.target.closest("a, button")) return;
        const card = event.target.closest(".site-card");
        if (!card) return;
        event.preventDefault();
        openSiteDetail(getSiteById(card.dataset.id));
      });

      els.siteDialog.addEventListener("click", (event) => {
        if (event.target === els.siteDialog) {
          closeSiteDetail();
          return;
        }
        const closeButton = event.target.closest(".detail-close");
        if (closeButton) {
          closeSiteDetail();
          return;
        }
        const favoriteButton = event.target.closest(".detail-favorite");
        if (favoriteButton) {
          toggleFavorite(favoriteButton.dataset.id);
          favoriteButton.classList.toggle("is-saved", state.favorites.has(favoriteButton.dataset.id));
          return;
        }
        const drawerClose = event.target.closest(".relation-panel-close");
        if (drawerClose) {
          closeRelationDrawer(drawerClose);
          return;
        }
        const relationButton = event.target.closest(".map-action");
        if (relationButton) {
          openRelationDrawer(relationButton);
          return;
        }
        const mapNode = event.target.closest(".map-node");
        if (mapNode) {
          openSiteDetail(getSiteById(mapNode.dataset.id));
        }
      });

      els.favoritesButton.addEventListener("click", () => {
        state.favoritesOnly = !state.favoritesOnly;
        state.activeCategory = "all";
        state.activeSubcategory = "";
        render();
      });

      els.sideFavorites.addEventListener("click", () => {
        state.favoritesOnly = true;
        state.activeCategory = "all";
        state.activeSubcategory = "";
        render();
        closeMobileSidebar();
      });

      els.dinoGameButton.addEventListener("click", openGameWindow);
      els.gameClose.addEventListener("click", closeGameWindow);
      els.gameDialog.addEventListener("click", (event) => {
        if (event.target === els.gameDialog) closeGameWindow();
      });

      els.randomButton.addEventListener("click", () => {
        let cards = [...document.querySelectorAll(".site-card")];
        if (!cards.length) {
          if (!state.sites.length) state.sites = FALLBACK_SITES;
          state.search = "";
          els.search.value = "";
          state.activeCategory = "all";
          state.activeSubcategory = "";
          state.favoritesOnly = false;
          render();
          cards = [...document.querySelectorAll(".site-card")];
        }
        const card = cards[Math.floor(Math.random() * cards.length)];
        if (!card) return;
        card.classList.remove("is-pulsing");
        void card.offsetWidth;
        card.classList.add("is-pulsing");
        card.scrollIntoView({ behavior: "smooth", block: "center" });
        window.setTimeout(() => card.classList.remove("is-pulsing"), 1200);
      });

      els.themeToggle.addEventListener("click", () => {
        const next = document.documentElement.dataset.theme === "light" ? "dark" : "light";
        document.documentElement.dataset.theme = next;
      });

      els.menuButton.addEventListener("click", () => {
        const isOpen = els.sidebar.classList.toggle("is-open");
        els.backdrop.classList.toggle("is-open", isOpen);
        els.menuButton.setAttribute("aria-expanded", String(isOpen));
      });

      els.backdrop.addEventListener("click", closeMobileSidebar);
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeMobileSidebar();
      });
    }

    function startInkParticles() {
      const canvas = document.getElementById("inkCanvas");
      const ctx = canvas.getContext("2d");
      const particles = [];
      let width = 0;
      let height = 0;
      let raf = 0;
      let paused = false;
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
      const pointer = {
        x: 0,
        y: 0,
        active: false,
        radius: 150
      };

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = `${width}px`;
        canvas.style.height = `${height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function createParticle(index) {
        return {
          x: Math.random() * width,
          y: Math.random() * height,
          vx: 0,
          vy: 0,
          size: 1 + Math.random() * 2,
          speed: 0.08 + Math.random() * 0.28,
          phase: Math.random() * Math.PI * 2,
          color: index % 3 === 0 ? "rgba(237,232,245,.48)" : "rgba(192,132,252,.44)"
        };
      }

      function draw() {
        if (paused) return;
        ctx.clearRect(0, 0, width, height);
        particles.forEach((particle) => {
          if (pointer.active && !reduceMotion.matches) {
            const dx = particle.x - pointer.x;
            const dy = particle.y - pointer.y;
            const distance = Math.hypot(dx, dy);
            if (distance > 0 && distance < pointer.radius) {
              const force = (1 - distance / pointer.radius) ** 2;
              particle.vx += (dx / distance) * force * 1.55;
              particle.vy += (dy / distance) * force * 1.55;
            }
          }

          particle.vx *= 0.92;
          particle.vy *= 0.92;
          particle.x += particle.vx;
          particle.y += particle.vy - particle.speed;
          particle.phase += 0.012;
          if (particle.y < -20) {
            particle.y = height + 20;
            particle.x = Math.random() * width;
            particle.vx = 0;
            particle.vy = 0;
          }
          if (particle.x < -30) particle.x = width + 30;
          if (particle.x > width + 30) particle.x = -30;
          if (particle.y > height + 30) particle.y = -30;
          const edgeFade = Math.min(1, particle.y / 90, (height - particle.y) / 90);
          ctx.globalAlpha = Math.max(0, edgeFade);
          ctx.fillStyle = particle.color;
          ctx.beginPath();
          ctx.arc(particle.x + Math.sin(particle.phase) * 10, particle.y, particle.size, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
        raf = requestAnimationFrame(draw);
      }

      resize();
      const particleCount = window.matchMedia("(max-width: 720px)").matches ? 64 : 96;
      for (let i = 0; i < particleCount; i += 1) particles.push(createParticle(i));
      window.addEventListener("resize", resize);
      window.addEventListener("pointermove", (event) => {
        pointer.x = event.clientX;
        pointer.y = event.clientY;
        pointer.active = true;
      }, { passive: true });
      window.addEventListener("pointerleave", () => {
        pointer.active = false;
      });
      window.addEventListener("blur", () => {
        pointer.active = false;
      });
      document.addEventListener("visibilitychange", () => {
        paused = document.hidden;
        if (!paused) {
          cancelAnimationFrame(raf);
          draw();
        }
      });
      draw();
    }

    document.addEventListener("DOMContentLoaded", () => {
      bindEvents();
      startInkParticles();
      loadData();
    });
  </script>
</body>
</html>
